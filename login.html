<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in · Continia Marketing Hub</title>
<script>try{if(sessionStorage.getItem("continia-auth")||localStorage.getItem("continia-auth"))location.replace("index.html")}catch(e){}</script>
<style>
  @font-face{font-family:"Alliance No.2";src:url("fonts/AllianceNo2-Regular.ttf") format("truetype");font-weight:400;font-style:normal;font-display:swap}
  @font-face{font-family:"Alliance No.2";src:url("fonts/AllianceNo2-SemiBold.ttf") format("truetype");font-weight:600;font-style:normal;font-display:swap}
  @font-face{font-family:"Alliance No.2";src:url("fonts/AllianceNo2-Bold.ttf") format("truetype");font-weight:800;font-style:normal;font-display:swap}
  *{box-sizing:border-box}
  :root{--navy:#052975;--cyan:#8ff8ff;--font:"Alliance No.2",-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,system-ui,sans-serif}
  html,body{height:100%}
  body{margin:0;font-family:var(--font);background:#041024;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;overflow-x:hidden;-webkit-font-smoothing:antialiased}
  .bg{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:-2}
  .bg-wash{position:fixed;inset:0;z-index:-1;background:linear-gradient(180deg,rgba(4,14,40,.34) 0%,rgba(4,12,34,.50) 55%,rgba(3,9,28,.66) 100%)}
  .card{width:100%;max-width:432px;min-width:0;flex:0 1 432px;padding:46px 42px 40px;border-radius:24px;
    background:rgba(13,22,44,.46);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
    border:1px solid rgba(255,255,255,.16);box-shadow:0 34px 90px -28px rgba(0,0,0,.62);
    animation:cardIn .55s cubic-bezier(.22,.61,.36,1) both}
  @keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .logo{display:block;width:198px;max-width:74%;height:auto;margin:0 auto 24px}
  h1{margin:0;text-align:center;font-size:33px;font-weight:800;letter-spacing:-.01em;line-height:1.05}
  .sub{margin:11px auto 0;text-align:center;font-size:14px;line-height:1.45;color:rgba(255,255,255,.7);max-width:30ch}
  form{margin-top:30px;display:grid;gap:17px}
  .field label{display:block;font-size:12px;font-weight:600;letter-spacing:.02em;color:rgba(255,255,255,.72);margin-bottom:8px}
  .field{position:relative}
  input[type=email],input[type=password],input[type=text]{
    width:100%;height:50px;border-radius:12px;border:1px solid rgba(255,255,255,.20);
    background:rgba(255,255,255,.06);color:#fff;padding:0 16px;font:inherit;font-size:15px;transition:.16s}
  .field.pw input{padding-right:50px}
  input::placeholder{color:rgba(255,255,255,.42)}
  input:focus{outline:none;border-color:var(--cyan);background:rgba(255,255,255,.10);box-shadow:0 0 0 3px rgba(143,248,255,.20)}
  .eye{position:absolute;right:8px;bottom:6px;width:38px;height:38px;display:grid;place-items:center;
    background:transparent;border:0;border-radius:9px;cursor:pointer;color:rgba(255,255,255,.62);transition:.15s}
  .eye:hover{color:#fff;background:rgba(255,255,255,.08)}
  .eye:focus-visible{outline:2px solid var(--cyan);outline-offset:1px}
  .eye svg{width:21px;height:21px;display:block}
  .eye .on-icon{display:none}
  .eye.on .off-icon{display:none}
  .eye.on .on-icon{display:block}
  .err{display:none;font-size:13px;color:#ffb1b1;text-align:center;margin:-4px 0 0}
  .err.show{display:block}
  .remember{display:flex;align-items:center;gap:10px;font-size:14px;color:rgba(255,255,255,.82);user-select:none}
  .remember input{width:17px;height:17px;accent-color:var(--cyan);cursor:pointer}
  .remember label{cursor:pointer}
  .btn{width:100%;height:52px;margin-top:6px;border:0;border-radius:12px;background:var(--navy);color:#fff;
    font:inherit;font-size:15px;font-weight:800;letter-spacing:.01em;cursor:pointer;transition:.16s}
  .btn:hover{background:#06317f;transform:translateY(-1px);box-shadow:0 12px 26px -14px rgba(5,41,117,.9)}
  .btn:active{transform:none}
  .btn:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .legal{margin:18px 0 0;text-align:center;font-size:11.5px;color:rgba(255,255,255,.45)}
  @media(prefers-reduced-motion:reduce){.card{animation:none}.btn:hover{transform:none}}
  @media(max-width:480px){.card{padding:38px 26px 32px}h1{font-size:28px}}
</style>
</head>
<body>
<video class="bg" autoplay muted loop playsinline poster="">
  <source src="Assets/Video for claude banner - Login_WEB.mp4" type="video/mp4">
  <source src="Assets/Video for claude banner - Login_WEB.webm" type="video/webm">
</video>
<div class="bg-wash"></div>

<main class="card">
  <img class="logo" src="Assets/Continia primary - white.svg" alt="Continia">
  <h1>Welcome back!</h1>
  <p class="sub">Sign in to access the Continia Marketing Hub</p>

  <form id="loginForm" autocomplete="on" novalidate>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="Enter your email" autocomplete="username" required>
    </div>
    <div class="field pw">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password" required>
      <button class="eye" id="eye" type="button" aria-label="Show password">
        <svg class="off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg class="on-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><path d="M6.61 6.61A18.5 18.5 0 0 0 1 12s4 7 11 7a9.12 9.12 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
      </button>
    </div>
    <p class="err" id="err">That email or password didn't work. Try again.</p>
    <div class="remember">
      <input id="remember" type="checkbox">
      <label for="remember">Remember me</label>
    </div>
    <button class="btn" type="submit">Log In</button>
  </form>
  <noscript><p class="err show" style="margin-top:14px">JavaScript is required to sign in.</p></noscript>
</main>

<script>
  var HASH="f92e6f2482383f92e501cddd0e6786cc7a10b7d3cc327ff2d2421e74db39d9c6";
  /* Authorized sign-in emails — add more @continia.com addresses here, one per
     line (case-insensitive). The shared password is still required as well. */
  var ALLOWED_EMAILS=[
    "anch@continia.com"
  ];
  var em=document.getElementById("email"),pw=document.getElementById("password"),
      eye=document.getElementById("eye"),err=document.getElementById("err"),
      form=document.getElementById("loginForm");
  eye.addEventListener("click",function(){
    var show=pw.type==="password";
    pw.type=show?"text":"password";
    eye.classList.toggle("on",show);
    eye.setAttribute("aria-label",show?"Hide password":"Show password");
  });
  async function sha256(s){
    var b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));
    return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,"0");}).join("");
  }
  form.addEventListener("submit",async function(e){
    e.preventDefault();
    err.classList.remove("show");
    var addr=(em.value||"").trim().toLowerCase();
    var okEmail=ALLOWED_EMAILS.some(function(x){return x.trim().toLowerCase()===addr;});
    var h=await sha256(pw.value);
    if(okEmail && h===HASH){
      try{
        var remember=document.getElementById("remember").checked;
        (remember?localStorage:sessionStorage).setItem("continia-auth","1");
        (remember?sessionStorage:localStorage).removeItem("continia-auth");
      }catch(_){}
      location.replace("index.html");
    }else{
      err.classList.add("show");
      pw.value="";
      (okEmail?pw:em).focus();
    }
  });
</script>
</body>
</html>
